name: Update GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours
  workflow_dispatch: # Allows manual refresh via the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Main Stats & Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: salonyranjan
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          
          # Styling to match your Radical theme
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss
          plugin_languages_details: percentage
          
          # Output configuration
          filename: github-metrics.svg
          optimize: css, xml, svg

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.svg
          git commit -m "chore: automated metrics update" || exit 0
          git push
