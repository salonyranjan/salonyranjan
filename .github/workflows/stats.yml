name: Update GitHub Metrics
on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours
  workflow_dispatch: # Allows manual refresh via the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Main Stats & Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: salonyranjan
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          
          # Styling
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss
          plugin_languages_details: percentage
          
          # Output configuration
          filename: github-metrics.svg
          optimize: css, xml, svg
          
          # Built-in Committer (Replaces your manual git steps)
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "chore: automated metrics update"
